name: Component Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  component-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npx vitest run --environment jsdom --coverage --coverage.reporter=text --coverage.reporter=json-summary --passWithNoTests

      - name: Save PR number
        if: always() && github.event_name == 'pull_request'
        run: echo ${{ github.event.pull_request.number }} > pr_number.txt

      - name: Upload results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: component-test-results
          path: |
            coverage/
            pr_number.txt
